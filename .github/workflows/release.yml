name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ./Mp3Extractor/Mp3Extractor.csproj

      - name: Build Release
        run: dotnet build ./Mp3Extractor/Mp3Extractor.csproj -c Release --no-restore

      - name: Publish single-file executable
        run: dotnet publish ./Mp3Extractor/Mp3Extractor.csproj -c Release -o ./publish -p:Version=${{ github.ref_name }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## MP3 Extractor Release
            
            **Version**: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./publish/Mp3Extractor.exe
          asset_name: Mp3Extractor-${{ github.ref_name }}.exe
          asset_content_type: application/octet-stream

      - name: Print Success
        run: |
          Write-Host "? Build and Release completed successfully!" -ForegroundColor Green
          Write-Host "Release: ${{ github.ref_name }}" -ForegroundColor Cyan
          Write-Host "Executable: Mp3Extractor-${{ github.ref_name }}.exe" -ForegroundColor Yellow
